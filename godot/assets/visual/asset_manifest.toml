schema_version = 1
logical_tile_pixels = 64
source_tile_pixels = 256
render_scale = 0.25
style = "painterly-lived-in-sci-fi-frontier-copper-cyan"

# `ready` is intentionally family-wide. Flip it only when every listed file is final.
# `legacy_dir` records the superseded 64 px source so coverage stays auditable.

[[family]]
id = "terrain"
category = "world/terrain"
legacy_dir = "godot/assets/generated"
target_dir = "godot/assets/visual/world/terrain"
files = ["terrain_dirt.png", "terrain_grass.png", "terrain_sand.png", "terrain_water.png"]
ready = true
frame_width = 256
frame_height = 256
columns = 4
rows = 1
alpha = "opaque"
seams = "tileable"
anchor = [0.5, 0.5]

